<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrouh Olivi - Intro</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    height: 100%;
    overflow: hidden;
    background: #000;
}

.video-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;
    background: #000;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.3s ease;
}

video.ready {
    opacity: 1;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.3);
    z-index: 10000;
    transition: opacity 0.5s ease;
}

.start-btn {
    padding: 20px 50px;
    font-size: 20px;
    border: none;
    background: #fff;
    color: #000;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.start-btn:hover {
    transform: scale(1.05);
    background: #000;
    color: #fff;
}

@media(max-width: 768px) {
    .start-btn {
        font-size: 16px;
        padding: 15px 35px;
    }
}
</style>
</head>
<body>

<div class="video-container" id="videoContainer">
    
    <video id="myVideo" 
           preload="metadata"
           playsinline 
           webkit-playsinline
           muted>
        
        <!-- 🖥️ Desktop -->
        <source 
            src="https://res.cloudinary.com/dkaxpgdds/video/upload/v1774528164/0323_2_g93lxe.mp4" 
            type="video/mp4"
            media="(min-width: 769px)">
        
        <!-- 📱 Mobile -->
        <source 
            src="https://res.cloudinary.com/dkaxpgdds/video/upload/v1774528483/0326_1_weiudq.mp4" 
            type="video/mp4"
            media="(max-width: 768px)">
        
        <!-- 🔄 Fallback -->
        <source 
            src="https://res.cloudinary.com/dkaxpgdds/video/upload/v1774528164/0323_2_g93lxe.mp4" 
            type="video/mp4">
    </video>

    <div class="overlay" id="overlay">
        <button class="start-btn" onclick="startVideo()">Shop Now</button>
    </div>
    
</div>

<script>
// ✅ Cloudinary URLs
const VIDEO_URLS = {
    desktop: "https://res.cloudinary.com/dkaxpgdds/video/upload/v1774528164/0323_2_g93lxe.mp4",
    mobile: "https://res.cloudinary.com/dkaxpgdds/video/upload/v1774528483/0326_1_weiudq.mp4"
};

const video = document.getElementById("myVideo");
const overlay = document.getElementById("overlay");
const container = document.getElementById("videoContainer");
let isStarted = false;

// ✅ Poster من أول فريم (Cloudinary)
function getPosterUrl(videoUrl) {
    return videoUrl.replace('/upload/', '/upload/so_0,w_1920,h_1080,c_fill/').replace('.mp4', '.jpg');
}

function setupVideo() {
    const isMobile = window.innerWidth <= 768;
    const videoUrl = isMobile ? VIDEO_URLS.mobile : VIDEO_URLS.desktop;
    const posterUrl = getPosterUrl(videoUrl);
    
    // ✅ Poster يظهر فوراً
    container.style.backgroundImage = `url('${posterUrl}')`;
    video.poster = posterUrl;
    
    video.load();
}

// ✅ أول فريم جاهز
video.addEventListener('loadeddata', function() {
    video.classList.add('ready');
});

video.addEventListener('loadedmetadata', function() {
    video.currentTime = 0;
    video.pause();
});

function startVideo() {
    if (isStarted) return;
    isStarted = true;
    
    overlay.style.opacity = "0";
    setTimeout(() => overlay.style.display = "none", 500);
    
    container.style.backgroundImage = 'none';
    video.muted = false;
    video.currentTime = 0;
    
    video.play().catch(function(error) {
        video.muted = true;
        video.play();
    });
}

video.addEventListener("ended", function() {
    window.location.href = "https://salmabehery.com/en";
});

// 🚀 ابدأ
setupVideo();
</script>

</body>
</html>
