<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrouh Olivi - Intro</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    height: 100%;
    overflow: hidden;
    background: #000;
}

.video-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 9999;
    background: #000;
}

/* ✅ الكواليتي عالية */
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* دي عشان الكواليتي */
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.3);
    z-index: 10000;
}

.start-btn {
    padding: 20px 50px;
    font-size: 20px;
    border: none;
    background: #fff;
    color: #000;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.start-btn:hover {
    transform: scale(1.05);
    background: #000;
    color: #fff;
}

/* موبايل */
@media(max-width: 768px) {
    .start-btn {
        font-size: 16px;
        padding: 15px 35px;
    }
}
</style>
</head>
<body>

<div class="video-container">
    
    <!-- ✅ preload="auto" عشان يحمل الفيديو كله -->
    <!-- ✅ poster عشان يظهر أول frame -->
    <video id="myVideo" 
           preload="auto" 
           playsinline 
           webkit-playsinline
           muted
           poster="https://firebasestorage.googleapis.com/v0/b/salma-behery.firebasestorage.app/o/0323(1).mp4?alt=media&token=e8280992-2aed-414b-a43b-5907a7813268#t=0.1">
        
        <!-- ✅ نفس الرابط بس نضيف #t=0 عشان يبدأ من الأول -->
        <source src="https://firebasestorage.googleapis.com/v0/b/salma-behery.firebasestorage.app/o/0323(1).mp4?alt=media&token=e8280992-2aed-414b-a43b-5907a7813268#t=0" type="video/mp4">
    </video>

    <div class="overlay" id="overlay">
        <button class="start-btn" onclick="startVideo()">Shop Now</button>
    </div>
    
</div>

<script>
const video = document.getElementById("myVideo");
const overlay = document.getElementById("overlay");

// ✅ نوقف الفيديو على أول frame بطريقة أقوى
function setFirstFrame() {
    video.currentTime = 0;
    video.pause();
    
    // نعملها تاني بعد شوية عشان يتأكد
    setTimeout(() => {
        video.currentTime = 0;
        video.pause();
    }, 100);
    
    setTimeout(() => {
        video.currentTime = 0;
        video.pause();
    }, 500);
    
    setTimeout(() => {
        video.currentTime = 0;
        video.pause();
    }, 1000);
}

// لما الفيديو يحمل
video.addEventListener('loadedmetadata', setFirstFrame);
video.addEventListener('loadeddata', setFirstFrame);
video.addEventListener('canplay', setFirstFrame);

// نعملها على طول كمان
setFirstFrame();

function startVideo() {
    overlay.style.opacity = "0";
    setTimeout(() => overlay.style.display = "none", 500);
    
    video.muted = false;
    video.currentTime = 0;
    
    video.play().catch(function(error) {
        video.muted = true;
        video.play();
    });
}

video.addEventListener("ended", function() {
    window.location.href = "https://salmabehery.com/en";
});
</script>

</body>
</html>
